name: interviewer
description: "An online AI JobHunting platform"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'

# The following defines the version and build number for your application.
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  permission_handler: ^11.0.0
  image_picker: ^1.0.4
  livekit_client: ^2.4.0  # <--- Added production client package here

  # State Management
  flutter_riverpod: ^2.5.1

  # Networking & Cookie Management (Essential for your Express backend)
  dio: ^5.5.0
  dio_cookie_manager: ^3.1.2
  cookie_jar: ^4.0.8
  path_provider: ^2.1.3

  # Navigation / Routing
  go_router: ^14.2.0

  # Local Storage & Offline Caching
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  flutter_markdown: ^0.7.7+1
  file_selector: ^1.0.3
  share_plus: ^12.0.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation for Hive TypeAdapters
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

  # Lint rules for clean code practices
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Asset management declared properly for your folder layout
  assets:
    - lib/assets/images/